name: Build LichtFeld Studio (EL9)

on:
  workflow_dispatch:
  push:
    paths:
      - 'lichtfeld-studio-el9.def'
      - '.github/workflows/build-lichtfeld-studio-el9.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Free disk space (optional but recommended)
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          df -h

      - name: Build SIF (with retries)
        env:
          APPTAINER_TMPDIR: ${{ runner.temp }}/apptainer-tmp
          APPTAINER_CACHEDIR: ${{ runner.temp }}/apptainer-cache
        run: |
          mkdir -p "$APPTAINER_TMPDIR" "$APPTAINER_CACHEDIR"
          apptainer --version

          # Retry build to tolerate transient registry/network failures.
          attempt=1
          max_attempts=3
          until [ "$attempt" -gt "$max_attempts" ]; do
            echo "Build attempt ${attempt}/${max_attempts}"
            if sudo -E apptainer build lichtfeld_studio_el9.sif lichtfeld-studio-el9.def; then
              echo "Apptainer build succeeded on attempt $attempt"
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Apptainer build failed after ${max_attempts} attempts"
              exit 1
            fi

            echo "Build attempt $attempt failed; cleaning cache and retrying after backoff..."
            rm -rf "$APPTAINER_CACHEDIR"/* "$APPTAINER_TMPDIR"/* || true
            sleep $((attempt * 45))
            attempt=$((attempt + 1))
          done

      - name: Smoke test image
        run: |
          apptainer exec lichtfeld_studio_el9.sif test -x /opt/lichtfeld/bin/LichtFeld-Studio
          apptainer exec lichtfeld_studio_el9.sif /opt/lichtfeld/bin/LichtFeld-Studio --help >/dev/null || true

      - name: Upload SIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: lichtfeld_studio_el9_sif
          path: lichtfeld_studio_el9.sif
