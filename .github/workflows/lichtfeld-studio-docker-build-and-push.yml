name: build-and-push

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo docker system prune -af || true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Smoke test build
        run: |
          docker build \
            --build-arg CUDA_VERSION=12.8.0 \
            --build-arg USER_UID=1000 \
            --build-arg USER_GID=1000 \
            --build-arg USERNAME=ubuntu \
            -f lichtfeld-studio-docker/Dockerfile \
            -t lichtfeld-studio:smoke \
            .
          docker run --rm lichtfeld-studio:smoke bash -lc "python3 --version && gcc --version"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./lichtfeld-studio-docker/Dockerfile
          push: true
          tags: |
            plasmax7/lichtfeld-studio:latest
            plasmax7/lichtfeld-studio:${{ github.sha }}
          build-args: |
            CUDA_VERSION=12.8.0
            USER_UID=1000
            USER_GID=1000
            USERNAME=ubuntu
