name: Build LichtFeld Studio (Docker-based Apptainer)

on:
  workflow_dispatch:
  push:
    paths:
      - 'lichtfeld-studio-docker.def'
      - '.github/workflows/build-lichtfeld-studio-docker-apptainer.yml'
  pull_request:
    paths:
      - 'lichtfeld-studio-docker.def'
      - '.github/workflows/build-lichtfeld-studio-docker-apptainer.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Free disk space (optional but recommended)
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          df -h

      - name: Build SIF
        env:
          APPTAINER_TMPDIR: ${{ runner.temp }}/apptainer-tmp
          APPTAINER_CACHEDIR: ${{ runner.temp }}/apptainer-cache
        run: |
          set -o pipefail
          mkdir -p "$APPTAINER_TMPDIR" "$APPTAINER_CACHEDIR"
          apptainer --version
          sudo -E apptainer build lichtfeld_studio_docker.sif lichtfeld-studio-docker.def 2>&1 | tee apptainer-build.log

      - name: Upload Apptainer build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lichtfeld_studio_docker_apptainer_build_log
          path: apptainer-build.log

      - name: Smoke test image
        if: success()
        run: |
          apptainer exec lichtfeld_studio_docker.sif sh -c 'command -v python3 >/dev/null'
          apptainer exec lichtfeld_studio_docker.sif sh -c 'command -v gcc >/dev/null'

      - name: Upload SIF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lichtfeld_studio_docker_sif
          path: lichtfeld_studio_docker.sif

      - name: Notify PR on failure (investigation requested)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const mention = `@${context.actor}`;

            let prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              const branch = context.ref.replace('refs/heads/', '');
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:${branch}`
              });
              if (prs.length > 0) {
                prNumber = prs[0].number;
              }
            }

            if (!prNumber) {
              core.info('No open PR found for this failed run; skipping PR comment.');
              return;
            }

            const body = [
              `🚨 ${mention} build failed for **Build LichtFeld Studio (Docker-based Apptainer)**.`,
              '',
              `Please investigate this run: ${runUrl}`,
              '',
              'I uploaded `apptainer-build.log` as an artifact for debugging.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body
            });
