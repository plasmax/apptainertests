name: Build LichtFeld Studio (EL9)

on:
  workflow_dispatch:
  push:
    paths:
      - 'lichtfeld-studio-el9.def'
      - '.github/workflows/build-lichtfeld-studio-el9.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Free disk space (optional but recommended)
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          df -h

      - name: Build SIF (with retries)
        env:
          APPTAINER_TMPDIR: ${{ runner.temp }}/apptainer-tmp
          APPTAINER_CACHEDIR: ${{ runner.temp }}/apptainer-cache
        run: |
          mkdir -p "$APPTAINER_TMPDIR" "$APPTAINER_CACHEDIR"
          apptainer --version

          # Retry build to tolerate transient registry/network failures.
          attempt=1
          max_attempts=3
          until [ "$attempt" -gt "$max_attempts" ]; do
            echo "Build attempt ${attempt}/${max_attempts}"
            if sudo -E apptainer build lichtfeld_studio_el9.sif lichtfeld-studio-el9.def; then
              echo "Apptainer build succeeded on attempt $attempt"
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Apptainer build failed after ${max_attempts} attempts"
              exit 1
            fi

            echo "Build attempt $attempt failed; cleaning cache and retrying after backoff..."
            rm -rf "$APPTAINER_CACHEDIR"/* "$APPTAINER_TMPDIR"/* || true
            sleep $((attempt * 45))
            attempt=$((attempt + 1))
          done

      - name: Smoke test image
        run: |
          apptainer exec lichtfeld_studio_el9.sif test -x /opt/LichtFeld-Studio/build/LichtFeld-Studio
          apptainer exec lichtfeld_studio_el9.sif test -x /opt/lichtfeld/bin/LichtFeld-Studio
          apptainer exec lichtfeld_studio_el9.sif sh -c 'ldd /opt/LichtFeld-Studio/build/LichtFeld-Studio >/dev/null'
          apptainer exec lichtfeld_studio_el9.sif sh -c 'env -i PATH=/usr/bin:/bin ldd /opt/lichtfeld/bin/LichtFeld-Studio >/dev/null'
          apptainer exec lichtfeld_studio_el9.sif sh -c 'test -e /opt/lichtfeld/lib64/liblfs_rmlui.so -o -e /opt/lichtfeld/lib/liblfs_rmlui.so'
          apptainer exec lichtfeld_studio_el9.sif sh -c 'test -d /opt/lichtfeld/lib/python/lfs_plugins && find /opt/lichtfeld/lib/python -maxdepth 1 -name "lichtfeld*.so" | grep -q .'
          apptainer exec lichtfeld_studio_el9.sif sh -c 'command -v xdg-open >/dev/null'
          apptainer exec lichtfeld_studio_el9.sif sh -c 'grep -q "DBUS_SESSION_BUS_ADDRESS" /.singularity.d/env/90-environment.sh && grep -q "/run/user/" /.singularity.d/env/90-environment.sh'
          apptainer exec lichtfeld_studio_el9.sif sh -c 'ar t /opt/LichtFeld-Studio/build/vcpkg_installed/x64-linux/lib/libSDL3.a | grep -Eq "x11|wayland"'

      - name: Upload SIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: lichtfeld_studio_el9_sif
          path: lichtfeld_studio_el9.sif
